apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki-stack
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://grafana.github.io/helm-charts
      chart: loki-stack
      targetRevision: 2.9.11
      helm:
        values: |
          promtail:
            enabled: true
        valueFiles:
          - $values/argocd/values/loki-stack/loki-values.yaml
          - $values/argocd/values/loki-stack/prometheus-values.yaml
          - $values/argocd/values/loki-stack/grafana-values.yaml
    - repoURL: http://192.168.1.117/gary/homelab-argocd-config
      targetRevision: HEAD
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
